<html>
  <head>
    <title>Aladino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans:400,700&display=swap" rel="stylesheet">
    <style>html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Noto Sans", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      main {
        display: flex;
        width: 100%;
        height: 100%;
      }

      iframe {
        border: 0;
        flex: 1;
      }

      aside {
        border-right: 2px solid rgba(0, 0, 0, 0.04);
        padding: 10px;
        padding-right: 15px;
        min-height: 50vh;
        min-width: 100px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* aside h1 {
        margin: 0;
        margin-bottom: 30px;
        font-size: 20px;
      } */

      aside a {
        display: block;
        font-size: 11px;
        margin-top: 10px;
      }

      aside a.active {
        font-weight: 700;
      }

      a,
      a:active,
      a:visited,
      a:hover {
        color: inherit;
        text-decoration: none;
      }

      .edit {
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 12px;
        border-radius: 50%;
        margin-bottom: 0px;
        background-color: #fff;
        opacity: 0.9;
        z-index: 999;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
      }</style>
  <script src="/infinite.js"></script></head>

    <main>
      <aside>
        
        <a href="/infinite.html">Infinite Slider</a>
        
      </aside>
