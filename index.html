<html>
  <head>
    <title>Aladino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css?family=Noto+Sans:400,700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Noto Sans", sans-serif;
        color: rgba(233, 247, 246, 0.685);
      }

      * {
        box-sizing: border-box;
      }

      article {
        position: absolute;
        top: 0;
        left: 0;
        width: 10vw;
        height: 20vh;
      }

      article img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      main {
        top: 100px;
        display: flex;
        width: 100%;
        height: 100%;
        background-color: midnightblue;
      }
    
      iframe {
        border: 0;
        flex: 1;
      }

      aside {
        padding-left: 25px;
        min-height: 50vh;
        min-width: 20px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .homebutton a{
        display:inline-flex;
        padding-left: 0px;
        font-size: 13px;
        white-space: nowrap; 
        overflow: hidden; 
      }

      .homebutton a:hover {
        overflow: visible;
        text-decoration: line-through;
        color:rgb(251, 152, 213)
      }


      aside a {
        display:flex;
        text-align: center;
        font-size: 11px;
        margin-top: 30px; 
        padding-left: 3vh;
      }

      aside a.active {
        font-weight: 700;
        color: lightpink;
      }

      a,
      a:active,
      a:visited,
      a:hover {
        color: inherit;
        text-decoration: none;
        font-size: 120%;
      }

      .edit {
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 12px;
        border-radius: 50%;
        margin-bottom: 0px;
        background-color:midnightblue;
        opacity: 0.1;
        z-index: 999;
        box-shadow: 0 0 4px rgba(40, 38, 151, 0.527);
      }
    </style>
  </head>
  <body>
    <article>
      <img src="assets/images/3.jpg" />
    </article>
    <main>
      <aside> 
        <a id="infinite" href="infinite.html"></a>
        <div class="homebutton" style="text-overflow:clip;"><a href="./mollyhome/indexhome.html" target="_blank" >Molly ❤️ Maison</a></div>
        <a href="infinite.html">Infinite</a>
        <a href="follow.html">FollowMe</a>
        <a href="./mollyUtopie/Molly's Utopie.html">Utopie</a>
        <a href="./assets/images/chambre1.jpg">Chambre</a>
        <a href="./assets/images/salleensemble.jpg">Photographie</a>
        <a href="./assets/images/corpfemme.jpg">Corp</a>
        <a href="./assets/images/designJardin.jpg">Jardin</a>
        <a href="./assets/images/nomanland1.jpg">Inspiration</a>
        <a href="#">Contact</a>
      </aside>

      <iframe class="iframe" allow="autoplay" src=""></iframe>

    </main>

    <script>
      const links = [...document.querySelectorAll("aside a")];
      const iframe = document.querySelector(".iframe");
      // const edit = document.querySelector(".edit");

      const update = () => {
        current = location.hash
          ? location.hash.substring(1)
          : links[0].getAttribute("href");
        iframe.src = current;

        links.forEach((l) => l.classList.remove("active"));

        const link = document.querySelector(`a[href='${current}']`);
        link.classList.add("active");

        // edit.href = `https://github.com/luruke/aladino/tree/master/docs/${current}`;
      };

      links.forEach((link) => {
        link.addEventListener("click", (e) => {
          if (e.which > 1 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey)
            return false;

          e.preventDefault();
          location.hash = link.getAttribute("href");
        });
      });

      window.addEventListener("popstate", update);
      update();
    </script>

    <script type="module">
      import Aladino from "./src/index.js";
      import Pointer from "./assets/pointer.js";
      import lerp from "./assets/lerp.js";

      const pointer = new Pointer();
      const aladino = new Aladino({
        density: 20,
      });

      document.body.appendChild(aladino.canvas);

      const material = aladino.material({
        vertex: /* glsl */ `
          attribute vec2 position;
          attribute vec2 uv;

          uniform mat4 projection;
          uniform float time;
          uniform vec2 speed;

          varying vec2 vUv;

          float parabola( float x, float k ) {
            return pow( 4.0*x*(1.0-x), k );
          }

          void main() {
            vUv = uv;

            vec4 pos = vec4(position, 0.0, 1.0);

            vec2 spee = speed * 0.03;

            pos.x += parabola(uv.y, 1.0) * spee.x;
            pos.y -= parabola(uv.x, 1.0) * spee.y;

            gl_Position = projection * pos;
          }
        `,
        fragment: /* glsl */ `
          precision highp float;

          uniform vec2 size;
          uniform vec2 sizeImage;
          uniform sampler2D image;
          uniform vec2 speed;

          varying vec2 vUv;

          vec4 coverTexture(sampler2D tex, vec2 imgSize, vec2 ouv) {
            vec2 s = size;
            vec2 i = imgSize;

            float rs = s.x / s.y;
            float ri = i.x / i.y;
            vec2 new = rs < ri ? vec2(i.x * s.y / i.y, s.y) : vec2(s.x, i.y * s.x / i.x);
            vec2 offset = (rs < ri ? vec2((new.x - s.x) / 2.0, 0.0) : vec2(0.0, (new.y - s.y) / 2.0)) / new;
            vec2 uv = ouv * s / new + offset;
          
            return texture2D(tex, uv);
          }

          void main() {
            vec2 s = vUv;

            s -= .5;
            s *= 0.7;
            s -= (speed * 0.03);
            s += .5;

            gl_FragColor = coverTexture(image, sizeImage, s);
          }
        `,
      });

      const el = document.querySelector("article");

      const carpet = aladino.carpet(el, {
        material,
        uniforms: {
          image: aladino.texture(el.querySelector("img").src),
          speed: [0, 0],
        },
      });

      let oldSpeed = [0, 0];

      const update = () => {
        requestAnimationFrame(update);

        carpet.position[0] = lerp(
          carpet.position[0],
          pointer.coords[0] - carpet.bounds.width / 2,
          0.2
        );
        carpet.position[1] = lerp(
          carpet.position[1],
          pointer.coords[1] - carpet.bounds.height / 2,
          0.2
        );

        carpet.uniforms.speed[0] = lerp(
          carpet.uniforms.speed[0],
          (carpet.position[0] - oldSpeed[0]) * 0.1,
          0.7
        );
        carpet.uniforms.speed[1] = lerp(
          carpet.uniforms.speed[1],
          (carpet.position[1] - oldSpeed[1]) * 0.1,
          0.7
        );

        oldSpeed[0] = carpet.position[0];
        oldSpeed[1] = carpet.position[1];
      };

      update();
    </script>
  </body>
</html>
